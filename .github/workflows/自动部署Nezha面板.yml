name: 自动部署nezha面板到SAP

on:
  workflow_dispatch: # 只允许手动触发
    inputs:
      region:
        description: "选择部署区域"
        required: true
        default: "US(free)"
        type: choice
        options:
          #  免费区域
          - SG(free) # azure新加披
          - US(free) # aws美国
          # SAP 区域
          - SAP-UAE(Dubai)
          - SAP-AU(Sydney)
          - SAP-US(Sterling)
          - SAP-US-West(Colorado)
          - SAP-JP(Tokyo)
          # AWS 区域
          - AWS-AU(Sydney)
          - AWS-BR(São Paulo)
          - AWS-KR(Seoul)
          - AWS-CA(Montreal)
          - AWS-US(VA)
          - AWS-US(OR)
          - AWS-EU(Frankfurt)
          - AWS-JP(Tokyo)
          - AWS-SG(Singapore)
          # GCP 区域
          - GCP-AU(Sydney)
          - GCP-BR(São Paulo)
          - GCP-US(IA)
          - GCP-EU(Frankfurt)
          - GCP-JP(Osaka)
          - GCP-JP(Tokyo)
          - GCP-IL(Tel Aviv)
          - GCP-IN(Mumbai)
          - GCP-KSA(Dammam)
          # Azure 区域
          - Azure-AU(Sydney)
          - Azure-BR(São Paulo)
          - Azure-CA(Montreal)
          - Azure-US(VA)
          - Azure-US(WA)
          - Azure-EU(Netherlands)
          - Azure-JP(Tokyo)
          - Azure-SG(Singapore)
          # SAP Neo 区域
          - Neo-UAE(Dubai)
          - Neo-KSA(Riyadh)
      app_name:
        description: "应用名称(可选,留空则自动生成,被占用会部署失败)"
        required: false
        default: ""

env:
  # 默认使用本仓库 GHCR 镜像，可通过 secrets.DOCKER_IMAGE 覆盖
  DOCKER_IMAGE: ${{ secrets.DOCKER_IMAGE || format('ghcr.io/{0}/argo-nezha:latest', github.repository_owner) }}
  MEMORY: ${{ secrets.MEMORY || '512M' }}
  DISK: ${{ secrets.DISK || '1024M' }}

jobs:
  deploy-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CF CLI
        run: |
          wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
          echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install -y cf8-cli

      - name: Determine CF API endpoint and app name
        run: |
          # 设置API端点和生成随机字符串
          RANDOM_STR=$(head /dev/urandom | tr -dc 'a-z' | head -c 6)

          case "${{ github.event.inputs.region }}" in
            # 免费区域
            "SG(free)")
              echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-freesg$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "US(free)")
              echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-freeus$RANDOM_STR" >> $GITHUB_ENV
              ;;
            # SAP 区域
            "SAP-UAE(Dubai)")
              echo "CF_API=https://api.cf.ae01.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-sap-ae$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "SAP-AU(Sydney)")
              echo "CF_API=https://api.cf.ap01.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=sap-ap$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "SAP-US(Sterling)")
              echo "CF_API=https://api.cf.us01.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=sap-us1$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "SAP-US-West(Colorado)")
              echo "CF_API=https://api.cf.us02.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=sap-us2$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "SAP-JP(Tokyo)")
              echo "CF_API=https://api.cf.jp01.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=sap-jp$RANDOM_STR" >> $GITHUB_ENV
              ;;
            # AWS 区域
            "AWS-AU(Sydney)")
              echo "CF_API=https://api.cf.ap10.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-awsau$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "AWS-BR(São Paulo)")
              echo "CF_API=https://api.cf.br10.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-awsbr$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "AWS-KR(Seoul)")
              echo "CF_API=https://api.cf.ap12.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-awskr$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "AWS-CA(Montreal)")
              echo "CF_API=https://api.cf.ca10.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-awsca$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "AWS-US(VA)")
              echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-awsusva$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "AWS-US(OR)")
              echo "CF_API=https://api.cf.us11.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-awsusor$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "AWS-EU(Frankfurt)")
              echo "CF_API=https://api.cf.eu10-005.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-waseu$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "AWS-JP(Tokyo)")
              echo "CF_API=https://api.cf.jp10.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-awsjp$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "AWS-SG(Singapore)")
              echo "CF_API=https://api.cf.ap11.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-awssg$RANDOM_STR" >> $GITHUB_ENV
              ;;

            # GCP 区域
            "GCP-AU(Sydney)")
              echo "CF_API=https://api.cf.ap30.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-gcpau$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "GCP-BR(São Paulo)")
              echo "CF_API=https://api.cf.br30.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-gcpbr$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "GCP-US(IA)")
              echo "CF_API=https://api.cf.us30.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-gcpus$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "GCP-EU(Frankfurt)")
              echo "CF_API=https://api.cf.eu30.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-gcpeu$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "GCP-JP(Osaka)")
              echo "CF_API=https://api.cf.jp30.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-gcpjpo$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "GCP-JP(Tokyo)")
              echo "CF_API=https://api.cf.jp31.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-gcpjpt$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "GCP-IL(Tel Aviv)")
              echo "CF_API=https://api.cf.il30.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-gcpil$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "GCP-IN(Mumbai)")
              echo "CF_API=https://api.cf.in30.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-gcpin$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "GCP-KSA(Dammam)")
              echo "CF_API=https://api.cf.sa31.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-gcpsa$RANDOM_STR" >> $GITHUB_ENV
              ;;

            # Azure 区域
            "Azure-AU(Sydney)")
              echo "CF_API=https://api.cf.ap20.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-azau$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "Azure-BR(São Paulo)")
              echo "CF_API=https://api.cf.br20.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-azbr$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "Azure-CA(Montreal)")
              echo "CF_API=https://api.cf.ca20.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-azca$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "Azure-US(VA)")
              echo "CF_API=https://api.cf.us21.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-azva$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "Azure-US(WA)")
              echo "CF_API=https://api.cf.us20.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-azwa$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "Azure-EU(Netherlands)")
              echo "CF_API=https://api.cf.eu20-001.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-azeu$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "Azure-JP(Tokyo)")
              echo "CF_API=https://api.cf.jp20.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-azjp$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "Azure-SG(Singapore)")
              echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-azsg$RANDOM_STR" >> $GITHUB_ENV
              ;;

            # SAP Neo 区域
            "Neo-UAE(Dubai)")
              echo "CF_API=https://api.cf.neo-ae1.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-neouae$RANDOM_STR" >> $GITHUB_ENV
              ;;
            "Neo-KSA(Riyadh)")
              echo "CF_API=https://api.cf.neo-sa1.hana.ondemand.com" >> $GITHUB_ENV
              echo "APP_NAME=nzdash-neoksa$RANDOM_STR" >> $GITHUB_ENV
              ;;
          esac

          # 如果用户提供了应用名称，则使用用户提供的
          if [ -n "${{ github.event.inputs.app_name }}" ]; then
            echo "APP_NAME=${{ github.event.inputs.app_name }}" >> $GITHUB_ENV
          fi

          echo "使用API端点: $CF_API"
          echo "应用名称: $APP_NAME"
          echo "镜像地址: ${{ env.DOCKER_IMAGE }}"

      - name: Login to Cloud Foundry
        run: |
          cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}"

          # 获取组织列表
          ORG=$(cf orgs | sed -n '4p')
          echo "Selected org: $ORG"
          echo "ORG=$ORG" >> $GITHUB_ENV

          # 获取空间列表
          SPACE=$(cf spaces | sed -n '4p')
          echo "Selected space: $SPACE"
          echo "SPACE=$SPACE" >> $GITHUB_ENV

          # 使用获取的组织和空间重新登录
          cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}" -o "$ORG" -s "$SPACE"

      - name: Deploy application
        run: |
          if cf push ${{ env.APP_NAME }} \
              --docker-image ${{ env.DOCKER_IMAGE }} \
              -m ${{ env.MEMORY }} \
              -k ${{ env.DISK }} \
              --health-check-type http \
              --endpoint /health \
              -t 180 \
              --no-start; then
            echo "Deployment successful"
          else
            echo "伙计,创建应用失败，可能由于名称冲突或平台资源不足。"
            exit 1
          fi

      - name: Verify deployment
        run: |
          # === 哪吒面板 / Argo 隧道 ===
          cf set-env ${{ env.APP_NAME }} ARGO_DOMAIN       "${{ secrets.ARGO_DOMAIN }}"        # Argo 域名（必填）
          cf set-env ${{ env.APP_NAME }} ARGO_AUTH         "${{ secrets.ARGO_AUTH }}"          # Argo Tunnel Token（必填）
          cf set-env ${{ env.APP_NAME }} NZ_UUID           "${{ secrets.NZ_UUID }}"            # 探针 UUID（必填）
          cf set-env ${{ env.APP_NAME }} NZ_CLIENT_SECRET  "${{ secrets.NZ_CLIENT_SECRET }}"   # agent_secret_key（可选，留空自动生成）
          cf set-env ${{ env.APP_NAME }} NZ_TLS            "${{ secrets.NZ_TLS }}"             # 是否启用 TLS（可选，默认 true）
          cf set-env ${{ env.APP_NAME }} AGENT_VERSION    "${{ secrets.AGENT_VERSION }}"      # 探针版本（可选，默认 latest）

          # === GitHub 备份 ===
          cf set-env ${{ env.APP_NAME }} GH_TOKEN          "${{ secrets.GH_TOKEN }}"           # GitHub PAT（必填）
          cf set-env ${{ env.APP_NAME }} GH_REPO_OWNER     "${{ secrets.GH_REPO_OWNER }}"      # 备份仓库所有者（必填）
          cf set-env ${{ env.APP_NAME }} GH_REPO_NAME      "${{ secrets.GH_REPO_NAME }}"       # 备份仓库名（必填）
          cf set-env ${{ env.APP_NAME }} GH_BRANCH         "${{ secrets.GH_BRANCH }}"          # 备份分支（可选，默认 main）
          cf set-env ${{ env.APP_NAME }} ZIP_PASSWORD      "${{ secrets.ZIP_PASSWORD }}"       # 备份压缩包密码（必填）

          # 重启应用
          if cf restage ${{ env.APP_NAME }}; then
             echo "✅ Nezha启动成功"
          else
             echo "❌ 应用启动失败，正在清理残留..."
             cf delete ${{ env.APP_NAME }} -f -r
             exit 1
          fi

      - name: 详细部署信息
        run: |
          echo "🚀 部署完成！详细信息如下："
          echo "区域(Region): ${{ github.event.inputs.region }}"
          echo "组织(ORG): ${{ env.ORG }}"
          echo "空间(SPACE): ${{ env.SPACE }}"
          echo "应用名称(App Name): ${{ env.APP_NAME }}"
          echo "镜像(Image): ${{ env.DOCKER_IMAGE }}"

          # 获取应用路由
          ROUTE=$(cf app ${{ env.APP_NAME }} | grep "routes:" | awk '{print $2}')
          if [ -n "$ROUTE" ]; then
            echo "伪装页 URL: https://$ROUTE"
            echo "⚠️ 哪吒面板真实访问地址 = https://ARGO_DOMAIN（通过 Cloudflare Tunnel）"
          else
            echo "⚠️ 未找到应用路由，请检查部署状态。"
          fi
